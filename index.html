<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gameday Stripes</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f5f3f0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #461d7c;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  font-size: 12px;
  color: #666;
}

select, button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  background: #461d7c;
  color: white;
  font-weight: bold;
}

.output {
  background: #000;
  color: white;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-wrap;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🐯 Gameday Stripes</h1>

  <div class="card">

    <label>SPORT</label>
    <select id="sport"></select>

    <label>OPPONENT</label>
    <select id="opponent"></select>

    <label>POST TYPE</label>
    <select id="type">
      <option>Gameday</option>
      <option>Result</option>
      <option>Product</option>
      <option>Fan</option>
    </select>

    <label>RESULT (for result posts)</label>
    <select id="result">
      <option>Win</option>
      <option>Loss</option>
      <option>Close Game</option>
    </select>

    <label>PRODUCT</label>
    <select id="product">
      <option>2025 National Champions Hat</option>
      <option>LSU Baseball Tee</option>
      <option>Gameday Stripes Hoodie</option>
    </select>

    <button onclick="generate()">Generate</button>
    <button onclick="generateMultiple()">Generate 3 Options</button>

  </div>

  <div id="outputs"></div>

</div>

<script>

// ===== SCHEDULE =====
const schedule = {
  Baseball: ["Louisiana Tech", "Oklahoma", "Texas A&M", "Arkansas"],
  Football: ["Clemson", "Alabama", "Ole Miss", "Florida"],
  Basketball: ["Duke", "Kentucky", "Florida", "Tennessee"]
};

// ===== INIT =====
const sportEl = document.getElementById("sport");
const opponentEl = document.getElementById("opponent");

function loadSports() {
  sportEl.innerHTML = "";
  Object.keys(schedule).forEach(sport => {
    const opt = document.createElement("option");
    opt.value = sport;
    opt.textContent = sport;
    sportEl.appendChild(opt);
  });
}

function loadOpponents() {
  const sport = sportEl.value;
  opponentEl.innerHTML = "";

  schedule[sport].forEach(team => {
    const opt = document.createElement("option");
    opt.value = team;
    opt.textContent = team;
    opponentEl.appendChild(opt);
  });
}

// ===== ENGAGEMENT GENERATOR =====
function generatePost() {
  const sport = sportEl.value;
  const opponent = opponentEl.value;
  const type = document.getElementById("type").value;
  const result = document.getElementById("result").value;
  const product = document.getElementById("product").value;

  const formats = {

    Gameday: [
`Be honest…

LSU vs ${opponent}

We winning or what?

👇`,

`LSU vs ${opponent}

Win or loss?

No fence sitting.

👇`,

`It’s ${sport} gameday.

If you’re not locked in already, what are we doing?

👇`
    ],

    Result: [
`Be honest…

That game vs ${opponent}…

How are we feeling?

👇`,

`${result === "Win" ? opponent + " just got handled." : "Tough one vs " + opponent + "."}

Say it louder.

👇`,

`${result === "Loss" ? "Yeah… we’re not talking about that one." : "That’s what we do."}

Agree or disagree?

👇`
    ],

    Product: [
`Most LSU merch is honestly terrible.

Too loud. Too messy.

So I made this.

${product}

Would you wear it?`,

`This isn’t your typical LSU gear.

${product}

Clean.

Simple.

Would you rock it?`,

`$20.25 right now.

${product}

Worth it or nah?

👇`
    ],

    Fan: [
`Real LSU fans don’t disappear.

Win or lose.

They stay.

You one of them?

👇`,

`If you’re still watching every game…

You’re built different.

👇`,

`Only real LSU fans will understand this feeling.

👇`
    ]
  };

  return random(formats[type]);
}

// ===== HELPERS =====
function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ===== RENDER =====
function renderPost(post) {
  const div = document.createElement("div");
  div.className = "output";

  div.innerHTML = `
${post}

<button onclick="copyText(this)">Copy</button>
`;

  document.getElementById("outputs").appendChild(div);
}

function generate() {
  document.getElementById("outputs").innerHTML = "";
  renderPost(generatePost());
}

function generateMultiple() {
  document.getElementById("outputs").innerHTML = "";
  for (let i = 0; i < 3; i++) {
    renderPost(generatePost());
  }
}

function copyText(btn) {
  const text = btn.parentElement.innerText.replace("Copy", "").trim();
  navigator.clipboard.writeText(text);
  btn.innerText = "Copied";
}

// ===== INIT RUN =====
loadSports();
loadOpponents();
sportEl.addEventListener("change", loadOpponents);

</script>

</body>
</html>
