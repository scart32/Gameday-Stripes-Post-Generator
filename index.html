<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gameday Stripes Content Engine</title>

<style>
:root {
  --purple:#461d7c;
  --gold:#fdd023;
  --bg:#0b0b0d;
  --panel:#16161b;
  --panel2:#1d1d24;
  --text:#f5f5f7;
  --muted:#9a9aa3;
  --border:#2a2a33;
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:20px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(180deg,#0a0a0c,#111114);
  color:var(--text);
}

.container{max-width:1000px;margin:auto;}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
}

.section-title{
  color:var(--gold);
  font-weight:800;
  font-size:13px;
  margin-bottom:12px;
  text-transform:uppercase;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.full{grid-column:1/-1;}

label{
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:6px;
  display:block;
}

select,textarea,button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:var(--text);
}

textarea{min-height:120px;}

button{
  cursor:pointer;
  font-weight:800;
}

.btn-primary{background:var(--purple);}
.btn-gold{background:var(--gold);color:#111;}

.output-card{
  background:#101014;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.badge{
  font-size:11px;
  font-weight:800;
  color:var(--gold);
  margin-bottom:6px;
}

.copy-btn{
  margin-top:8px;
  background:var(--purple);
}

.helper{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
}

.status{
  font-size:12px;
  color:var(--muted);
  margin-top:10px;
}

.interpret{
  background:#1a1a20;
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="section-title">Post Setup</div>

<div class="grid">
<div>
<label>Post Type</label>
<select id="type">
<option>Gameday</option>
<option>Result</option>
<option>Product</option>
<option>Fan</option>
<option>Hook</option>
<option>Thread</option>
<option>Reply</option>
</select>
</div>

<div>
<label>Mode</label>
<select id="mode">
<option>Normal</option>
<option>Controversial</option>
<option>Funny</option>
<option>Aggressive</option>
</select>
</div>

<div id="sportGroup">
<label>Sport</label>
<select id="sport"></select>
</div>

<div id="opponentGroup">
<label>Opponent</label>
<select id="opponent"></select>
</div>

<div id="resultGroup" style="display:none;">
<label>Result</label>
<select id="result">
<option>Win</option>
<option>Loss</option>
<option>Close Game</option>
</select>
</div>

<div id="productGroup" style="display:none;">
<label>Product</label>
<select id="product">
<option>LSU Hat</option>
<option>Baseball Tee</option>
<option>Hoodie</option>
</select>
</div>

<div class="full">
<label>Seed / Vibe / Stat</label>
<textarea id="vibe" placeholder="Example:
Derek Curiel is 7 for 7"></textarea>
<div class="helper">
Type a stat, idea, or feeling. AI will expand it into real posts.
</div>
</div>

</div>

<button class="btn-primary" onclick="generate()">Generate</button>
<div class="status" id="status">Ready</div>
</div>

<div id="outputs"></div>

</div>

<script>
const schedule={
Baseball:["Texas A&M","Arkansas","Auburn"],
Football:["Alabama","Florida"],
Basketball:["Kentucky","Duke"]
};

const sportEl=document.getElementById("sport");
const opponentEl=document.getElementById("opponent");
const typeEl=document.getElementById("type");
const statusEl=document.getElementById("status");
const outputsEl=document.getElementById("outputs");

function loadSports(){
sportEl.innerHTML="";
Object.keys(schedule).forEach(s=>{
let o=document.createElement("option");
o.value=s;o.textContent=s;
sportEl.appendChild(o);
});
}

function loadOpponents(){
opponentEl.innerHTML="";
schedule[sportEl.value].forEach(t=>{
let o=document.createElement("option");
o.value=t;o.textContent=t;
opponentEl.appendChild(o);
});
}

function updateFields(){
let t=typeEl.value;
document.getElementById("resultGroup").style.display=t==="Result"?"block":"none";
document.getElementById("productGroup").style.display=t==="Product"?"block":"none";
}

function getPayload(){
return{
type:typeEl.value,
mode:document.getElementById("mode").value,
sport:sportEl.value,
opponent:opponentEl.value,
result:document.getElementById("result").value,
product:document.getElementById("product").value,
vibe:document.getElementById("vibe").value
};
}

function clearOutputs(){
outputsEl.innerHTML="";
}

function render(text,label){
let card=document.createElement("div");
card.className="output-card";

let badge=document.createElement("div");
badge.className="badge";
badge.textContent=label;

let body=document.createElement("div");
body.textContent=text;

let btn=document.createElement("button");
btn.className="copy-btn";
btn.textContent="Copy";
btn.onclick=()=>navigator.clipboard.writeText(text);

card.appendChild(badge);
card.appendChild(body);
card.appendChild(btn);

outputsEl.appendChild(card);
}

function renderPack(d){
clearOutputs();

if(d.interpreted_angle){
let box=document.createElement("div");
box.className="interpret";
box.innerHTML="<strong>AI Angle:</strong><br>"+d.interpreted_angle;
outputsEl.appendChild(box);
}

render(d.primary,"Primary");

d.variations.forEach((v,i)=>render(v,"Variation "+(i+1)));
d.hooks.forEach((h,i)=>render(h,"Hook "+(i+1)));
d.replies.forEach((r,i)=>render(r,"Reply "+(i+1)));
render(d.thread.join("\n\n"),"Thread");
}

async function generate(){
statusEl.textContent="Generating...";
clearOutputs();

try{
const res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(getPayload())
});

const raw=await res.text();

let data;
try{
data=JSON.parse(raw);
}catch(e){
throw new Error(raw);
}

if(!res.ok) throw new Error(data.error);

renderPack(data);
statusEl.textContent="Done";

}catch(err){
statusEl.textContent="Error: "+err.message;
}
}

loadSports();
loadOpponents();
updateFields();

sportEl.addEventListener("change",loadOpponents);
typeEl.addEventListener("change",updateFields);
</script>
</body>
</html>
